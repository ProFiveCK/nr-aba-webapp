server {
    listen 80;
    server_name localhost;
    client_max_body_size 10m;

    # Explicitly handle favicon
    location = /favicon.ico {
        root /usr/share/nginx/html;
        access_log off;
        log_not_found off;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma "no-cache";
        add_header Expires "0";
    }

    location / {
        root /usr/share/nginx/html;
        index index.html;
        # SPA routing: fallback to index.html for all routes
        try_files $uri $uri/ /index.html;

        # Ensure the main HTML file is never cached
        if ($uri = '/index.html') {
            add_header Cache-Control "no-cache, no-store, must-revalidate";
            add_header Pragma "no-cache";
            add_header Expires "0";
        }
        
        # Disable caching for JS/CSS files to ensure updates are loaded
        location ~* \.(js|css)$ {
            add_header Cache-Control "no-cache, no-store, must-revalidate";
            add_header Pragma "no-cache";
            add_header Expires "0";
        }
    }

    location /api/ {
        proxy_pass http://ron-aba-backend:4000/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /health {
        proxy_pass http://ron-aba-backend:4000/health;
    }

    error_page 404 /404.html;
    location = /404.html {
        internal;
    }
}
