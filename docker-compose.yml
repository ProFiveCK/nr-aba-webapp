name: ron-stack-prod

services:
  # === Database ===
  postgres:
    image: postgres:15-alpine
    container_name: ron-aba-postgres-prod
    restart: unless-stopped
    env_file:
      - .env.prod
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: G7!xP@2vQz#1sL9w
      POSTGRES_DB: aba
    volumes:
      - ron-stack_pgdata:/var/lib/postgresql/data
    networks:
      - ron-net
    labels:
      - com.centurylinklabs.watchtower.enable=true
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U postgres -d aba || exit 1" ]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 10s
    # Do NOT publish 5432 publicly, keep it internal to the network

    # === API ===
  api:
    build:
      context: ./app/backend
      dockerfile: Dockerfile
    container_name: ron-aba-backend-prod
    restart: unless-stopped
    env_file:
      - .env.prod
    environment:
      DB_HOST: postgres
    depends_on:
      postgres:
        condition: service_healthy
    # Allow access to host machine for Windows sync service
    # On Linux, this enables host.docker.internal to work
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      ron-net:
        aliases:
          - ron-aba-backend
          - api
    healthcheck:
      test: [ "CMD-SHELL", "node -e \"require('http').get('http://127.0.0.1:4000/health', (res) => { process.exit(res.statusCode === 200 ? 0 : 1); }).on('error', () => process.exit(1));\"" ]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 15s

  # === Web (static site served by Nginx, custom nginx.conf mounts) ===
  web:
    image: nginx:alpine
    container_name: ron-aba-generator-prod
    restart: unless-stopped
    env_file:
      - .env.prod
    ports:
      - "80:80"
    volumes:
      - ./app/client/dist:/usr/share/nginx/html
      - ./app/docker/nginx.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      api:
        condition: service_healthy
    networks:
      - ron-net
    labels:
      - com.centurylinklabs.watchtower.enable=true
    healthcheck:
      test: [ "CMD-SHELL", "nc -z 127.0.0.1 80 || exit 1" ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  # === Watchtower (auto-updates) ===
  watchtower:
    image: containrrr/watchtower
    container_name: watchtower-ronstack
    restart: unless-stopped
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      TZ: Pacific/Nauru
      WATCHTOWER_CLEANUP: "true"
      WATCHTOWER_LABEL_ENABLE: "true"
    networks:
      - ron-net

  # === Portainer Agent ===
  portainer-agent:
    image: portainer/agent:latest
    container_name: portainer-agent-ronstack
    restart: unless-stopped
    ports:
      - "9001:9001"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - /var/lib/docker/volumes:/var/lib/docker/volumes
    networks:
      - ron-net

volumes:
  ron-stack_pgdata:
    external: true

networks:
  # This stack now expects an existing external network named "ron-net".
  # Create it with: docker network create ron-net
  ron-net:
    external: true
